<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QA Question Reviewer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>QA Question Reviewer</h1>

<input type="file" id="fileInput" accept=".json">

<button onclick="exportJSON()">Export Updated JSON</button>

<div id="questionsContainer"></div>

<div id="editorModal" class="modal hidden">

<div class="modalContent">

<div class="toolbar">

<button onclick="applyTag('b')"><b>B</b></button>
<button onclick="applyTag('i')"><i>I</i></button>
<button onclick="applyTag('u')"><u>U</u></button>
<button onclick="applyTag('s')"><s>S</s></button>

</div>

<div id="editor" contenteditable="true"></div>

<br>

<button id="saveBtn">Save</button>
<button onclick="closeEditor()">Cancel</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
